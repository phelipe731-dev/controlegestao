services:
  db:
    image: postgres:16-alpine
    container_name: campanha-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-campanha_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: campanha-backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PORT: 3333
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-campanha_db}?schema=public
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@campanha.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin@123}
      RUN_SEED_ON_START: ${RUN_SEED_ON_START:-false}
    ports:
      - 127.0.0.1:${API_PORT:-3333}:3333

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: campanha-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - 127.0.0.1:${FRONTEND_PORT:-5173}:80

volumes:
  postgres_data:
